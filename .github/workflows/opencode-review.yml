name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run opencode review
        uses: anomalyco/opencode/github@latest
        with:
          model: opencode/minimax-m2.5-free
          prompt: Review this pull request focusing only on the changed code. Identify issues related to code quality, best practices, bugs, edge cases, performance, and security. Report only the issues found, do not include other feedback.
